<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التقويم - نظام إدارة المشاريع</title>
  <link rel="icon" type="image/png" href="assets/images/1.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
  
  <style>
    @media (max-width: 768px) {
      .fc-toolbar-title {
        font-size: 14px !important;
      }
    
      .fc-col-header-cell {
        font-size: 10px !important;
        padding: 2px !important;
      }
    
      .fc-daygrid-day-number {
        font-size: 10px !important;
      }
    
      .fc-event {
        font-size: 9px !important;
        padding: 1px !important;
      }
    }
    .fc-event { cursor: pointer; padding: 2px 5px; }
    .fc-toolbar-title { font-family: 'Cairo', sans-serif; font-size: 1.2em !important; }
    .fc-button { background-color: var(--primary-color) !important; border-color: var(--primary-color) !important; }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/images/1.png" alt="Logo" class="logo-main" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
        <span class="sidebar-logo">إدارة المشاريع</span>
        <img src="assets/images/2.png" alt="Team Logo" class="logo-team" onerror="this.src='https://via.placeholder.com/40?text=Team'">
      </div>
      <nav class="sidebar-nav">
        <li><a href="dashboard.html">📈 لوحة التحكم</a></li>
        <li><a href="projects.html">📁 المشاريع</a></li>
        <li><a href="my-tasks.html">👉 مهامي</a></li>
        <li><a href="calendar.html" class="active">📅 التقويم</a></li>
        <li id="analyticsLink" style="display: none;"><a href="team-analytics.html">🔬 تحليلات الفريق</a></li>
      </nav>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <div class="navbar-brand">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <span>تقويم المهام</span>
        <div class="navbar-right">
          <div class="user-info">
            <div class="user-avatar" id="userAvatar">ع</div>
            <div>
              <div id="userName" style="font-weight: 600;">المستخدم</div>
              <div id="userRole" style="font-size: 12px; color: var(--text-secondary);">مستخدم</div>
            </div>
          </div>
         <!-- <button class="btn btn-danger btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>خروج</span></button> -->
        </div>
      </nav>

      <div class="content">
        <div class="card">
          <div id='calendar'></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/locales/ar.js'></script>
  <script src="scripts/supabase-client.js"></script>
  <script>
    if (!userManager.isLoggedIn()) window.location.href = 'login.html';
    const currentUser = userManager.getCurrentUser();

    document.getElementById('userName').textContent = currentUser.full_name;
    document.getElementById('userRole').textContent = userManager.getRoleLabel(currentUser.role);
    document.getElementById('userAvatar').textContent = currentUser.full_name.charAt(0);
    if (userManager.isManager()) document.getElementById('analyticsLink').style.display = 'block';

    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("sidebar");
    if (menuToggle && sidebar) menuToggle.onclick = () => sidebar.classList.toggle("active");
    const logoutBtn = document.getElementById('logoutBtn');

    if (logoutBtn) {
      logoutBtn.onclick = () => {
        if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
          userManager.logout();
          window.location.href = 'login.html';
        }
      };
    }

    document.addEventListener('DOMContentLoaded', async function() {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ar',
        direction: 'rtl',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: async function(info, successCallback, failureCallback) {
          try {
            let tasks = [];
            if (userManager.isAdmin()) {
              const { data } = await supabaseClient.from('tasks').select('*');
              tasks = data || [];
            } else if (userManager.isManager()) {
              const projects = await projectManager.getProjects(currentUser);
              tasks = await taskManager.getTasksForProjects(projects.map(p => p.id));
            } else {
              tasks = await taskManager.getMyTasks(currentUser.id);
            }

            const events = tasks.map(task => {
              let color = '#3498db'; // todo
              if (task.status === 'done') color = '#2ecc71';
              else if (task.status === 'in_progress') color = '#f1c40f';
              else if (task.status === 'delayed') color = '#e74c3c';
              
              if (task.is_extra) color = '#9b59b6'; // extra tasks

              return {
                title: task.title,
                start: task.due_date || task.created_at,
                backgroundColor: color,
                borderColor: color,
                extendedProps: { taskId: task.id, projectId: task.project_id }
              };
            });
            successCallback(events);
          } catch (error) {
            console.error('Calendar error:', error);
            failureCallback(error);
          }
        },
        eventClick: function(info) {
          window.location.href = `project-details.html?id=${info.event.extendedProps.projectId}`;
        }
      });
      calendar.render();
    });
  </script>
</body>
</html>
