<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | نظام إدارة المشاريع</title>
  <link rel="icon" type="image/png" href="assets/images/1.png">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-container">
  <div class="auth-card animate-fade">
    <div style="text-align: center;">
      <img src="assets/images/1.png" alt="Logo" class="auth-logo" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
    </div>
    <h1 class="auth-title">مرحباً بك</h1>
    <p class="auth-subtitle">سجل دخولك للبدء في إدارة مشاريعك</p>
    
    <form id="loginForm">
      <div class="form-group" style="text-align: right;">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" class="form-control" placeholder="example@mail.com" required>
      </div>
      
      <div class="form-group" style="text-align: right;">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
      </button>
    </form>
    
    <div id="errorMessage" style="color: var(--danger); margin-top: 15px; font-size: 14px; display: none;"></div>
    
    <div style="margin-top: 25px; color: var(--text-muted); font-size: 14px;">
      ليس لديك حساب؟ <a href="signup.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">إنشاء حساب جديد</a>
    </div>
    
    <div style="margin-top: 30px; font-size: 12px; color: var(--text-muted);">
      جميع الحقوق محفوظة &copy; <span class="footer-name">Mohamed Sayed Zaky</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.userManager.isLoggedIn()) {
        window.location.href = 'dashboard.html';
      }

      const loginForm = document.getElementById('loginForm');
      const errorDiv = document.getElementById('errorMessage');
      
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = e.target.querySelector('button');
        
        try {
          errorDiv.style.display = 'none';
          btn.disabled = true;
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
          
          await window.userManager.login(email, password);
          window.location.href = 'dashboard.html';
        } catch (error) {
          errorDiv.textContent = error.message;
          errorDiv.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
        }
      });
    });
  </script>
</body>
</html>
