<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المشاريع - نظام إدارة المشاريع</title>
  <link rel="icon" type="image/png" href="assets/images/1.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/images/1.png" alt="Logo" class="logo-main" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
        <div style="text-align: center; font-weight: 700; font-size: 18px;">نظام إدارة المشاريع</div>
        <img src="assets/images/2.png" alt="Team Logo" class="logo-team" onerror="this.src='https://via.placeholder.com/40?text=Team'">
      </div>
      <nav class="sidebar-nav">
        <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>لوحة التحكم</span></a></li>
        <li><a href="projects.html" class="active"><i class="fas fa-folder"></i> <span>المشاريع</span></a></li>
        <li><a href="my-tasks.html"><i class="fas fa-tasks"></i> <span>مهامي</span></a></li>
        <li><a href="calendar.html"><i class="fas fa-calendar-alt"></i> <span>التقويم</span></a></li>
        <li id="analyticsLink" style="display: none;"><a href="team-analytics.html"><i class="fas fa-microscope"></i> <span>تحليلات الفريق</span></a></li>
      </nav>
    </aside>

    <div class="main-content">
      <nav class="navbar animate-fade">
        <div class="navbar-brand">
          <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
          <span>إدارة المشاريع</span>
        </div>
        <div class="navbar-right">
          <button class="btn btn-primary btn-sm" id="addProjectBtn" style="display: none;"><i class="fas fa-plus"></i> <span>مشروع جديد</span></button>
          <div class="user-info">
            <div class="user-avatar" id="userAvatar">ع</div>
            <div class="user-details">
              <div id="userName" style="font-weight: 700;">المستخدم</div>
              <div id="userRole" style="font-size: 12px; color: var(--text-muted);">مستخدم</div>
            </div>
          </div>
         <!-- <button class="btn btn-danger btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>خروج</span></button> -->
        </div>
      </nav>

      <div class="content">
        <div id="projectsGrid" class="grid grid-3 animate-fade">
          <div style="grid-column: 1/-1; text-align: center; padding: 50px;">جاري تحميل المشاريع...</div>
        </div>
      </div>

      <footer class="footer">
        جميع الحقوق محفوظة &copy; <span class="footer-name">Mohamed Sayed Zaky</span> - 2026
      </footer>
    </div>
  </div>

  <!-- نافذة إضافة مشروع -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal">
      <div class="modal-header">
        <h3>إنشاء مشروع جديد</h3>
        <button class="btn btn-danger btn-sm" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>اسم المشروع</label>
          <input type="text" id="projectName" class="form-control" placeholder="مثلاً: تطوير الموقع الإلكتروني">
        </div>
        <div class="form-group">
          <label>وصف المشروع</label>
          <textarea id="projectDesc" class="form-control" rows="3" placeholder="وصف مختصر للمشروع..."></textarea>
        </div>
        <div class="grid grid-2">
          <div class="form-group">
            <label>تاريخ البداية</label>
            <input type="date" id="projectStart" class="form-control">
          </div>
          <div class="form-group">
            <label>تاريخ النهاية</label>
            <input type="date" id="projectEnd" class="form-control">
          </div>
        </div>
        <div class="form-group">
          <label>الأولوية</label>
          <select id="projectPriority" class="form-control">
            <option value="low">منخفضة</option>
            <option value="medium" selected>متوسطة</option>
            <option value="high">عالية</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" id="saveProjectBtn">إنشاء المشروع</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!window.userManager.isLoggedIn()) window.location.href = 'login.html';
      const currentUser = window.userManager.getCurrentUser();

      document.getElementById('userName').textContent = currentUser.full_name;
      document.getElementById('userRole').textContent = window.userManager.getRoleLabel(currentUser.role);
      document.getElementById('userAvatar').textContent = currentUser.full_name.charAt(0);
      
      if (window.userManager.isManager()) {
        document.getElementById('addProjectBtn').style.display = 'flex';
        document.getElementById('analyticsLink').style.display = 'block';
      }

      // Mobile Menu Toggle
      const menuToggle = document.getElementById('menuToggle');
      const sidebar = document.getElementById('sidebar');
      menuToggle.onclick = () => sidebar.classList.toggle('active');

    const logoutBtn = document.getElementById('logoutBtn');

    if (logoutBtn) {
      logoutBtn.onclick = () => {
        if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
          userManager.logout();
          window.location.href = 'login.html';
        }
      };
    }

      const modal = document.getElementById('projectModal');
      document.getElementById('addProjectBtn').onclick = () => modal.style.display = 'flex';
      window.closeModal = () => modal.style.display = 'none';

      async function loadProjects() {
        try {
          const projects = await window.projectManager.getProjects(currentUser);
          const grid = document.getElementById('projectsGrid');
          
          if (projects.length === 0) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">لا توجد مشاريع حالياً</div>';
            return;
          }

          const projectIds = projects.map(p => p.id);
          const allTasks = await window.taskManager.getTasksForProjects(projectIds);

          grid.innerHTML = projects.map(p => {
            const projectTasks = allTasks.filter(t => t.project_id === p.id);
            const progress = window.calculateProgress(projectTasks);
            const remaining = window.calculateRemainingDays(p.end_date);
            const priorityLabel = window.getPriorityLabel(p.priority);
            
            return `
              <div class="card animate-slide">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                  <h3 style="color: var(--primary); font-size: 18px;">${p.name}</h3>
                  <span class="badge ${p.priority === 'high' ? 'badge-danger' : p.priority === 'medium' ? 'badge-warning' : 'badge-info'}">${priorityLabel}</span>
                </div>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px; height: 45px; overflow: hidden;">${p.description || 'لا يوجد وصف'}</p>
                
                <div style="margin-bottom: 15px;">
                  <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px;">
                    <span>نسبة الإنجاز</span>
                    <span style="font-weight: 700;">${progress}%</span>
                  </div>
                  <div style="height: 8px; background: #eee; border-radius: 10px; overflow: hidden;">
                    <div style="width: ${progress}%; height: 100%; background: var(--primary); transition: width 0.5s ease;"></div>
                  </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted);">
                  <div>📅 ينتهي: <strong>${window.formatDate(p.end_date)}</strong></div>
                  <div style="color: ${remaining < 3 ? 'var(--danger)' : 'inherit'}; font-weight: 700;">⏳ متبقي: ${remaining} يوم</div>
                </div>

                <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
                  <a href="project-details.html?id=${p.id}" class="btn btn-primary" style="width: 100%; justify-content: center;">عرض التفاصيل <i class="fas fa-eye" style="margin-right: 8px;"></i></a>
                </div>
              </div>
            `;
          }).join('');
        } catch (error) {
          console.error('Error loading projects:', error);
        }
      }

      document.getElementById('saveProjectBtn').onclick = async () => {
        const name = document.getElementById('projectName').value;
        const desc = document.getElementById('projectDesc').value;
        const start = document.getElementById('projectStart').value;
        const end = document.getElementById('projectEnd').value;
        const priority = document.getElementById('projectPriority').value;

        if (!name || !end) { alert('يرجى إدخال اسم المشروع وتاريخ النهاية'); return; }

        try {
          await window.projectManager.createProject(name, desc, start, end, priority, currentUser.id);
          window.closeModal();
          loadProjects();
        } catch (e) { alert('حدث خطأ أثناء إنشاء المشروع'); }
      };

      loadProjects();
    });
  </script>
</body>
</html>
